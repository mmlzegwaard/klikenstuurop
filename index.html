<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hortos Ridder API JSON GET</title>
  <meta name="description" content="Webpagina die via JSON GET data ophaalt van de Hortos Ridder API">
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent-dark: #16a34a;
      --border: #334155;
      --error: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, var(--bg) 60%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    button {
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #04210e;
      font-weight: bold;
      padding: 10px 16px;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
      color: #eaffef;
    }

    .status {
      min-height: 22px;
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: var(--error);
    }

    pre {
      margin: 0;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      overflow: auto;
      max-height: 60vh;
      color: #d1fae5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>JSON GET naar Hortos Ridder API</h1>
    <p>Vul een endpoint in en klik op <strong>Data ophalen</strong> om JSON-data op te vragen met een GET-request.</p>

    <div class="controls">
      <div class="field">
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" type="url" value="https://api.hortosridder.nl" aria-label="API URL">
      </div>
      <button id="loadButton" type="button">Data ophalen</button>
    </div>

    <div id="status" class="status"></div>
    <pre id="result" aria-live="polite">Nog geen data opgehaald.</pre>
  </main>

  <script>
    const urlInput = document.getElementById("apiUrl");
    const loadButton = document.getElementById("loadButton");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");

    async function fetchJson() {
      const rawValue = urlInput.value.trim();

      if (!rawValue) {
        statusEl.textContent = "Vul eerst een geldige API-URL in.";
        statusEl.className = "status error";
        return;
      }

      let endpoint;
      try {
        endpoint = new URL(rawValue).toString();
      } catch {
        statusEl.textContent = "De ingevulde URL is ongeldig.";
        statusEl.className = "status error";
        return;
      }

      if (!endpoint.startsWith("http://") && !endpoint.startsWith("https://")) {
        statusEl.textContent = "Gebruik een URL die met http:// of https:// begint.";
        statusEl.className = "status error";
        return;
      }

      statusEl.textContent = "Data wordt opgehaald...";
      statusEl.className = "status";
      resultEl.textContent = "";

      try {
        const response = await fetch(endpoint, {
          method: "GET",
          mode: "cors",
          credentials: "omit",
          headers: {
            "Accept": "application/json"
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP-fout: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();
        statusEl.textContent = "Succes: JSON-data ontvangen.";
        statusEl.className = "status";
        resultEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        statusEl.textContent = `Fout bij ophalen: ${error.message}`;
        statusEl.className = "status error";
        resultEl.textContent = "Geen JSON-data beschikbaar.";
      }
    }

    loadButton.addEventListener("click", fetchJson);
  </script>
</body>
</html>
